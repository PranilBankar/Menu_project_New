name: menu_intelligence
description: AI-powered food discovery app for local restaurant menus.
publish_to: none
version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  
  # Networking
  http: ^1.2.0
  dio: ^5.4.0
  
  # State management
  provider: ^6.1.1
  
  # UI & Design
  google_fonts: ^6.2.1
  flutter_animate: ^4.5.0
  cached_network_image: ^3.3.1
  carousel_slider: ^5.1.2
  dots_indicator: ^4.0.1
  
  # Voice AI Agent
  speech_to_text: ^7.0.0
  flutter_tts: ^4.2.0
  permission_handler: ^11.3.1

  # Media
  image_picker: ^1.0.7
  cupertino_icons: ^1.0.6
  
  # Utils
  intl: ^0.19.0
  uuid: ^4.3.3
  http_parser: ^4.1.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/animations/
